apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbuild-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qbuild-gateway
  template:
    metadata:
      labels:
        app: qbuild-gateway
    spec:
      containers:
      - name: gateway
        image: qbuild-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
