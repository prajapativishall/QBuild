apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbuild-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qbuild-auth
  template:
    metadata:
      labels:
        app: qbuild-auth
    spec:
      containers:
      - name: auth
        image: qbuild-auth:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
